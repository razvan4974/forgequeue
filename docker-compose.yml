services:
  postgres:
    image: postgres:16
    container_name: forgequeue-postgres
    environment:
      POSTGRES_USER: forgequeue
      POSTGRES_PASSWORD: forgequeue
      POSTGRES_DB: forgequeue
    ports:
      - "5432:5432"
    volumes:
      - forgequeue_data:/var/lib/postgresql/data

volumes:
  forgequeue_data: